<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Doc Collab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f8fafc; --card: #fff; --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --error: #dc2626; --radius: 10px; --shadow-md: 0 4px 12px rgba(0,0,0,0.08); }
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); max-width: 380px; margin: 0 auto; padding: 2rem 1.25rem; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.35rem; }
    p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .card { background: var(--card); padding: 1.75rem; border-radius: var(--radius); box-shadow: var(--shadow-md); border: 1px solid var(--border); }
    label { display: block; font-weight: 500; margin-bottom: 0.4rem; font-size: 0.9rem; }
    input { width: 100%; padding: 0.65rem 0.75rem; margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: inherit; }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
    button { width: 100%; padding: 0.7rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    button:hover:not(:disabled) { background: var(--primary-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: var(--error); font-size: 0.9rem; margin-bottom: 1rem; }
    .link { margin-top: 1.25rem; text-align: center; font-size: 0.9rem; color: var(--muted); }
    .link a { color: var(--primary); font-weight: 500; text-decoration: none; }
    .link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
  <h1>Sign in</h1>
  <p>Sign in to open the document editor.</p>

  <div id="error" class="error" style="display: none;"></div>

  <form id="form">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email" />
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password" />
    <button type="submit" id="btn">Sign in</button>
  </form>

  <div class="link">Don't have an account? <a href="/signup">Sign up</a></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('btn');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
    function hideError() {
      errorEl.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      btn.disabled = true;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/auth/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showError(data.error || 'Sign in failed');
          btn.disabled = false;
          return;
        }
        if (data.session) {
          localStorage.setItem('doc_collab_session', JSON.stringify(data.session));
          window.location.href = '/dashboard';
          return;
        }
        showError('Invalid response');
      } catch (err) {
        showError('Network error. Try again.');
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
